apiVersion: batch/v1
kind: Job
metadata:
  name: shiftex-experiment
  namespace: uci-dsm
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: NotIn
                    values:
                      - NVIDIA-GeForce-GTX-1080-Ti
                      - NVIDIA-GeForce-GTX-1080
                      - NVIDIA-GeForce-GTX-1070
                      - NVIDIA-GeForce-GTX-1060
                      - Tesla-P100-PCIE-16GB
      containers:
        - name: shiftex
          image: insert_image_here  # ← replace before running
          imagePullPolicy: Always
          command: ["/bin/bash", "launch.sh"]
          env:
            - name: SERVER_ADDRESS
              value: "localhost:50051"
            - name: EXPECTED_CLIENTS
              value: "4"
            - name: ASSIGNMENT_SEED
              value: "0"
            - name: SEVERITY
              value: "5"
            - name: DATASET
              value: "cifar10c"
            - name: HF_TOKEN
              value: "REPLACE_WITH_YOUR_HF_TOKEN"  # ← replace before running
          resources:
            limits:
              nvidia.com/gpu: "4"
              cpu: "9"
              memory: "40Gi"
            requests:
              nvidia.com/gpu: "4"
              cpu: "9"
              memory: "40Gi"
